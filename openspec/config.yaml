schema: spec-driven

context: |
  Project: Apify Crypto Skill
  Overview: Python skill package providing async functions for AI agents to fetch
    cryptocurrency data via Apify actors. Wraps two actors: Crypto Data Scraper
    (KuCoin OHLCV/candlestick data) and CoinGecko Crypto Intelligence (market data,
    trending coins, historical prices, categories).
  Stack: Python 3.12+, httpx (async HTTP), pydantic (models/validation)
  Architecture: Thin client layer (src/crypto_skill/client.py) handles Apify REST API
    calls. Domain modules (kucoin.py, coingecko.py) expose clean async functions.
    Pydantic models (models.py) define typed inputs/outputs.
  Apify Actors:
    - Crypto Data Scraper: moving_beacon-owner1/my-actor-14 (KuCoin OHLCV, real-time prices)
    - CoinGecko Intelligence: benthepythondev/crypto-intelligence (market, trending, historical, categories)
  API: Apify REST API v2 — POST /v2/acts/{actorId}/run-sync-get-dataset-items for sync runs,
    POST /v2/acts/{actorId}/runs for async runs with polling via GET /v2/actor-runs/{runId}.
    Auth via Authorization: Bearer <APIFY_TOKEN> header.
  Testing: pytest + pytest-asyncio, respx for httpx mocking
  Linting: ruff (lint + format), pyright (type checking)

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then format
  design:
    - Include sequence diagrams for complex flows
    - Prefer deep modules — simple interface hiding Apify API complexity
    - Consider at least two design approaches before committing
  tasks:
    - Each task < 2 hours
    - Include acceptance criteria
    - Specify test files to create/update
    - Include applicable code quality constraints from CODE_PRINCIPLES.md
    - Specify error handling strategy (Apify API errors, timeouts, rate limits)
  code:
    - Functions do one thing
    - No magic values — all Apify endpoints, timeouts, defaults as named constants
    - Prefer deep modules — simple interface, complex implementation hidden
    - Error handling is mandatory for all async operations and Apify API calls
    - Names reveal intent — no abbreviations
    - Maximum 3 levels of nesting
    - Comments explain WHY, not WHAT
    - No duplicated logic
    - KISS and YAGNI
    - All public functions must have type annotations
